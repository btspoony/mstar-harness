name: CI

on:
  push:
    branches:
      - main
    tags-ignore:
      - "v*"
    paths:
      - "packages/cli/**"
      - "packages/opencode/**"
      - "skills/**"
      - "agents/**"
      - "commands/**"
      - "package.json"
      - "bun.lock"
      - "bun.lockb"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "packages/cli/**"
      - "packages/opencode/**"
      - "skills/**"
      - "agents/**"
      - "commands/**"
      - "package.json"
      - "bun.lock"
      - "bun.lockb"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build CLI
        run: bun run cli:build

      - name: Build OpenCode
        run: bun run opencode:build

      - name: CLI smoke check
        run: bun run --cwd packages/cli check

      - name: Pack CLI tarball
        run: bun run cli:pack

      - name: Pack OpenCode tarball
        run: bun run opencode:pack
