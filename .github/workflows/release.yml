name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Validate release versions
        run: bun run release:validate
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Typecheck
        run: bun run typecheck

      - name: Publish @mstar-harness/cli
        run: npm publish --workspace @mstar-harness/cli --access public

      - name: Publish @mstar-harness/opencode
        run: npm publish --workspace @mstar-harness/opencode --access public

      - name: Extract changelog notes
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes-${VERSION}.md"
          bun run scripts/extract-changelog-section.ts "$VERSION" > "$NOTES_FILE"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.changelog.outputs.version }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: false
          prerelease: false
